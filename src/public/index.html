<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ReportBot — Dashboard</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #f5f5f5; color: #333; }
    header { background: #1a1a2e; color: #fff; padding: 16px 24px; display: flex; justify-content: space-between; align-items: center; }
    header h1 { font-size: 20px; font-weight: 600; }
    .header-right { display: flex; align-items: center; gap: 12px; }
    .header-right span { font-size: 14px; opacity: 0.8; }
    .container { max-width: 1000px; margin: 24px auto; padding: 0 16px; }
    .card { background: #fff; border-radius: 8px; box-shadow: 0 1px 3px rgba(0,0,0,.1); padding: 20px; margin-bottom: 16px; }
    .card h2 { font-size: 16px; margin-bottom: 12px; color: #1a1a2e; }
    table { width: 100%; border-collapse: collapse; font-size: 14px; }
    th, td { text-align: left; padding: 8px 12px; border-bottom: 1px solid #eee; }
    th { background: #f9f9f9; font-weight: 600; font-size: 12px; text-transform: uppercase; color: #666; }
    .badge { padding: 2px 8px; border-radius: 12px; font-size: 12px; font-weight: 500; }
    .badge-success { background: #d4edda; color: #155724; }
    .badge-failed { background: #f8d7da; color: #721c24; }
    .badge-running { background: #fff3cd; color: #856404; }
    .badge-pending { background: #e2e3e5; color: #383d41; }
    .badge-enabled { background: #cce5ff; color: #004085; }
    .badge-disabled { background: #e2e3e5; color: #6c757d; }
    button { padding: 6px 14px; border: none; border-radius: 4px; cursor: pointer; font-size: 13px; }
    .btn-primary { background: #1a1a2e; color: #fff; }
    .btn-primary:hover { background: #16213e; }
    .btn-sm { padding: 4px 10px; font-size: 12px; }
    .btn-run { background: #28a745; color: #fff; }
    .btn-run:hover { background: #218838; }
    .btn-danger { background: #dc3545; color: #fff; }
    .btn-danger:hover { background: #c82333; }
    .btn-link { background: none; color: #fff; text-decoration: underline; cursor: pointer; border: none; font-size: 13px; }
    .actions { display: flex; gap: 6px; }
    .empty { text-align: center; padding: 40px; color: #999; }
    dialog { border: none; border-radius: 8px; padding: 24px; max-width: 560px; width: 90%; box-shadow: 0 4px 20px rgba(0,0,0,.2); }
    dialog::backdrop { background: rgba(0,0,0,.4); }
    .form-group { margin-bottom: 12px; }
    .form-group label { display: block; font-size: 13px; font-weight: 600; margin-bottom: 4px; }
    .form-group input, .form-group select, .form-group textarea { width: 100%; padding: 8px; border: 1px solid #ddd; border-radius: 4px; font-size: 14px; }
    .form-group textarea { height: 80px; font-family: monospace; }
    .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
    .form-actions { display: flex; gap: 8px; justify-content: flex-end; margin-top: 16px; }
    .auth-page { max-width: 400px; margin: 80px auto; padding: 0 16px; }
    .auth-page .card { padding: 32px; }
    .auth-page h2 { text-align: center; margin-bottom: 20px; }
    .auth-toggle { text-align: center; margin-top: 16px; font-size: 14px; }
    .auth-toggle a { color: #1a1a2e; cursor: pointer; text-decoration: underline; }
    .auth-error { color: #dc3545; font-size: 13px; margin-bottom: 12px; display: none; }
    .plans { display: grid; grid-template-columns: repeat(3, 1fr); gap: 16px; margin-top: 12px; }
    .plan-card { border: 2px solid #eee; border-radius: 8px; padding: 20px; text-align: center; }
    .plan-card.active { border-color: #1a1a2e; background: #f0f0ff; }
    .plan-card h3 { margin-bottom: 8px; }
    .plan-card .price { font-size: 24px; font-weight: 700; color: #1a1a2e; }
    .plan-card .price span { font-size: 14px; font-weight: 400; color: #666; }
    .plan-card ul { list-style: none; margin: 12px 0; font-size: 14px; color: #555; }
    .plan-card ul li { padding: 4px 0; }
    .plan-card .btn-upgrade { margin-top: 12px; }
    #app-dashboard { display: none; }
  </style>
</head>
<body>
  <!-- Auth Page -->
  <div id="auth-page" class="auth-page">
    <div class="card">
      <h2 id="auth-title">Log In</h2>
      <div class="auth-error" id="auth-error"></div>
      <form id="auth-form" onsubmit="handleAuth(event)">
        <div class="form-group">
          <label>Email</label>
          <input name="email" type="email" required placeholder="you@example.com">
        </div>
        <div class="form-group">
          <label>Password</label>
          <input name="password" type="password" required placeholder="Min 8 characters" minlength="8">
        </div>
        <div class="form-actions" style="justify-content:stretch">
          <button type="submit" class="btn-primary" style="flex:1" id="auth-btn">Log In</button>
        </div>
      </form>
      <div class="auth-toggle">
        <span id="auth-toggle-text">Don't have an account?</span>
        <a onclick="toggleAuthMode()" id="auth-toggle-link">Register</a>
      </div>
    </div>
  </div>

  <!-- Dashboard (shown after login) -->
  <div id="app-dashboard">
    <header>
      <h1>ReportBot</h1>
      <div class="header-right">
        <span id="user-email"></span>
        <button class="btn-link" onclick="logout()">Log out</button>
        <button class="btn-primary" onclick="openCreateDialog()">+ New Pipeline</button>
      </div>
    </header>

    <div class="container">
      <div class="card" id="billing-card">
        <h2>Billing</h2>
        <div id="billing-info"></div>
        <div class="plans">
          <div class="plan-card" id="plan-free">
            <h3>Free</h3>
            <div class="price">$0</div>
            <ul><li>3 pipelines</li><li>Community support</li></ul>
            <span class="badge badge-enabled" id="free-badge" style="display:none">Current Plan</span>
          </div>
          <div class="plan-card" id="plan-pro">
            <h3>Pro</h3>
            <div class="price">$29<span>/mo</span></div>
            <ul><li>25 pipelines</li><li>Priority support</li></ul>
            <button class="btn-primary btn-upgrade" onclick="upgradePlan('pro')" id="pro-btn">Upgrade</button>
          </div>
          <div class="plan-card" id="plan-business">
            <h3>Business</h3>
            <div class="price">$99<span>/mo</span></div>
            <ul><li>Unlimited pipelines</li><li>Dedicated support</li></ul>
            <button class="btn-primary btn-upgrade" onclick="upgradePlan('business')" id="business-btn">Upgrade</button>
          </div>
        </div>
      </div>

      <div class="card">
        <h2>Pipelines</h2>
        <div id="pipelines-table"></div>
      </div>

      <div class="card">
        <h2>Recent Runs</h2>
        <div id="runs-table"></div>
      </div>
    </div>
  </div>

  <dialog id="create-dialog">
    <h2 style="margin-bottom:16px">Create Pipeline</h2>
    <form id="pipeline-form" onsubmit="createPipeline(event)">
      <div class="form-group">
        <label>Name</label>
        <input name="name" required placeholder="Daily Sales Report">
      </div>
      <div class="form-row">
        <div class="form-group">
          <label>Schedule (cron)</label>
          <input name="schedule" required placeholder="0 9 * * *" title="Cron expression">
        </div>
        <div class="form-group">
          <label>Timezone</label>
          <input name="timezone" value="UTC" placeholder="America/New_York">
        </div>
      </div>
      <div class="form-row">
        <div class="form-group">
          <label>Source Type</label>
          <select name="source_type">
            <option value="postgres">PostgreSQL</option>
            <option value="google_sheets">Google Sheets</option>
          </select>
        </div>
        <div class="form-group">
          <label>Delivery Type</label>
          <select name="delivery_type">
            <option value="email">Email</option>
            <option value="slack">Slack</option>
          </select>
        </div>
      </div>
      <div class="form-group">
        <label>Source Config (JSON)</label>
        <textarea name="source_config" placeholder='{"connection_string": "postgresql://..."}'></textarea>
      </div>
      <div class="form-group">
        <label>Query</label>
        <textarea name="query_text" required placeholder="SELECT * FROM sales WHERE date = CURRENT_DATE"></textarea>
      </div>
      <div class="form-group">
        <label>Delivery Config (JSON)</label>
        <textarea name="delivery_config" placeholder='{"to": "team@example.com"}'></textarea>
      </div>
      <div class="form-group">
        <label>Alert Condition (optional)</label>
        <input name="alert_condition" placeholder="total_revenue < 1000">
      </div>
      <div class="form-actions">
        <button type="button" onclick="document.getElementById('create-dialog').close()">Cancel</button>
        <button type="submit" class="btn-primary">Create</button>
      </div>
    </form>
  </dialog>

  <script>
    const API = '/api';
    let authMode = 'login'; // or 'register'
    let token = localStorage.getItem('reportbot_token');
    let userEmail = localStorage.getItem('reportbot_email');

    function authHeaders() {
      return { 'Authorization': `Bearer ${token}`, 'Content-Type': 'application/json' };
    }

    function showAuth() {
      document.getElementById('auth-page').style.display = 'block';
      document.getElementById('app-dashboard').style.display = 'none';
    }

    function showDashboard() {
      document.getElementById('auth-page').style.display = 'none';
      document.getElementById('app-dashboard').style.display = 'block';
      document.getElementById('user-email').textContent = userEmail;
      load();
      loadBilling();
    }

    function toggleAuthMode() {
      authMode = authMode === 'login' ? 'register' : 'login';
      document.getElementById('auth-title').textContent = authMode === 'login' ? 'Log In' : 'Register';
      document.getElementById('auth-btn').textContent = authMode === 'login' ? 'Log In' : 'Register';
      document.getElementById('auth-toggle-text').textContent = authMode === 'login' ? "Don't have an account?" : 'Already have an account?';
      document.getElementById('auth-toggle-link').textContent = authMode === 'login' ? 'Register' : 'Log In';
      document.getElementById('auth-error').style.display = 'none';
    }

    async function handleAuth(e) {
      e.preventDefault();
      const f = new FormData(e.target);
      const errEl = document.getElementById('auth-error');
      errEl.style.display = 'none';

      const endpoint = authMode === 'login' ? '/api/auth/login' : '/api/auth/register';
      try {
        const res = await fetch(endpoint, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ email: f.get('email'), password: f.get('password') }),
        });
        const data = await res.json();
        if (!res.ok) { errEl.textContent = data.error; errEl.style.display = 'block'; return; }

        token = data.token;
        userEmail = data.user.email;
        localStorage.setItem('reportbot_token', token);
        localStorage.setItem('reportbot_email', userEmail);
        showDashboard();
      } catch (err) {
        errEl.textContent = 'Network error. Please try again.';
        errEl.style.display = 'block';
      }
    }

    function logout() {
      token = null;
      userEmail = null;
      localStorage.removeItem('reportbot_token');
      localStorage.removeItem('reportbot_email');
      showAuth();
    }

    async function apiFetch(url, opts = {}) {
      const res = await fetch(url, { ...opts, headers: { ...authHeaders(), ...opts.headers } });
      if (res.status === 401) { logout(); throw new Error('Session expired'); }
      return res;
    }

    async function load() {
      try {
        const [pipelines, runs] = await Promise.all([
          apiFetch(`${API}/pipelines`).then(r => r.json()),
          apiFetch(`${API}/runs`).then(r => r.json()),
        ]);
        renderPipelines(pipelines);
        renderRuns(runs);
      } catch (err) {
        if (err.message === 'Session expired') return;
      }
    }

    function renderPipelines(pipelines) {
      const el = document.getElementById('pipelines-table');
      if (!pipelines.length) { el.innerHTML = '<p class="empty">No pipelines yet. Create one to get started.</p>'; return; }
      el.innerHTML = `<table>
        <tr><th>Name</th><th>Schedule</th><th>Source</th><th>Delivery</th><th>Status</th><th>Actions</th></tr>
        ${pipelines.map(p => `<tr>
          <td>${esc(p.name)}</td>
          <td><code>${esc(p.schedule)}</code></td>
          <td>${esc(p.source_type)}</td>
          <td>${esc(p.delivery_type)}</td>
          <td><span class="badge ${p.enabled ? 'badge-enabled' : 'badge-disabled'}">${p.enabled ? 'enabled' : 'disabled'}</span></td>
          <td class="actions">
            <button class="btn-sm btn-run" onclick="triggerRun('${p.id}')">Run</button>
            <button class="btn-sm btn-danger" onclick="deletePipeline('${p.id}')">Delete</button>
          </td>
        </tr>`).join('')}
      </table>`;
    }

    function renderRuns(runs) {
      const el = document.getElementById('runs-table');
      if (!runs.length) { el.innerHTML = '<p class="empty">No runs yet.</p>'; return; }
      el.innerHTML = `<table>
        <tr><th>Pipeline</th><th>Status</th><th>Started</th><th>Finished</th><th>Result</th></tr>
        ${runs.map(r => `<tr>
          <td>${esc(r.pipeline_name)}</td>
          <td><span class="badge badge-${r.status}">${r.status}</span></td>
          <td>${r.started_at ? new Date(r.started_at).toLocaleString() : '-'}</td>
          <td>${r.finished_at ? new Date(r.finished_at).toLocaleString() : '-'}</td>
          <td>${r.error ? '<span style="color:red">' + esc(r.error).slice(0, 80) + '</span>' : r.result ? esc(JSON.stringify(r.result)) : '-'}</td>
        </tr>`).join('')}
      </table>`;
    }

    function esc(s) { const d = document.createElement('div'); d.textContent = s || ''; return d.innerHTML; }

    async function loadBilling() {
      try {
        const res = await apiFetch(`${API}/billing/plan`);
        if (!res.ok) return;
        const data = await res.json();
        const limitText = data.pipelineLimit === Infinity ? 'unlimited' : data.pipelineLimit;
        document.getElementById('billing-info').innerHTML =
          `<p>Current plan: <strong>${data.plan}</strong> &mdash; ${data.pipelineCount} / ${limitText} pipelines used</p>`;

        // Highlight active plan
        ['free', 'pro', 'business'].forEach(p => {
          document.getElementById('plan-' + p).classList.toggle('active', data.plan === p);
        });
        document.getElementById('free-badge').style.display = data.plan === 'free' ? 'inline' : 'none';
        document.getElementById('pro-btn').textContent = data.plan === 'pro' ? 'Current Plan' : 'Upgrade';
        document.getElementById('pro-btn').disabled = data.plan === 'pro' || data.plan === 'business';
        document.getElementById('business-btn').textContent = data.plan === 'business' ? 'Current Plan' : 'Upgrade';
        document.getElementById('business-btn').disabled = data.plan === 'business';
      } catch {}
    }

    async function upgradePlan(plan) {
      try {
        const res = await apiFetch(`${API}/billing/checkout`, {
          method: 'POST',
          body: JSON.stringify({ plan }),
        });
        if (!res.ok) { const err = await res.json(); alert(err.error); return; }
        const data = await res.json();
        window.location.href = data.url;
      } catch (err) {
        alert('Failed to start checkout: ' + err.message);
      }
    }

    function openCreateDialog() { document.getElementById('create-dialog').showModal(); }

    async function createPipeline(e) {
      e.preventDefault();
      const f = new FormData(e.target);
      let sourceConfig, deliveryConfig;
      try { sourceConfig = JSON.parse(f.get('source_config') || '{}'); } catch { alert('Invalid source config JSON'); return; }
      try { deliveryConfig = JSON.parse(f.get('delivery_config') || '{}'); } catch { alert('Invalid delivery config JSON'); return; }
      sourceConfig.timezone = f.get('timezone');

      const body = {
        name: f.get('name'),
        schedule: f.get('schedule'),
        source_type: f.get('source_type'),
        source_config: sourceConfig,
        query_text: f.get('query_text'),
        delivery_type: f.get('delivery_type'),
        delivery_config: deliveryConfig,
        alert_condition: f.get('alert_condition') || null,
      };

      const res = await apiFetch(`${API}/pipelines`, { method: 'POST', body: JSON.stringify(body) });
      if (res.ok) { document.getElementById('create-dialog').close(); e.target.reset(); load(); }
      else { const err = await res.json(); alert(err.error); }
    }

    async function triggerRun(id) {
      const res = await apiFetch(`${API}/pipelines/${id}/run`, { method: 'POST' });
      if (res.ok) { alert('Run completed!'); load(); }
      else { const err = await res.json(); alert('Run failed: ' + err.error); }
    }

    async function deletePipeline(id) {
      if (!confirm('Delete this pipeline?')) return;
      await apiFetch(`${API}/pipelines/${id}`, { method: 'DELETE' });
      load();
    }

    // Init: check if we have a valid token
    if (token) {
      apiFetch('/api/auth/me').then(r => {
        if (r.ok) showDashboard();
        else logout();
      }).catch(() => logout());
    } else {
      showAuth();
    }
  </script>
</body>
</html>
